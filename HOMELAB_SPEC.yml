# Standards and Best Practices
x-standards:
  docker-compose:
    required_fields:
      - services
      - networks
    service_standards:
      - Field: container_name (required, lowercase, hyphenated)
      - Field: restart (required, value: unless-stopped)
      - Field: networks (required, contains: geek-infra)
      - Field: env_file (for services with secrets, path: /etc/homelab/secrets/*.env)
      - Field: image (required, prefer pinned versions over :latest)
    network_standards:
      - Name: geek-infra (required)
      - Type: external (required)
      - Purpose: All services communicate over this network
    volume_standards:
      - Host path: Must start with /srv/homelab/{service-name}/
      - Container path: Service-specific, document in comments
      - Backup: Tag volumes that need backup in this spec
    security_standards:
      - No hardcoded secrets in docker-compose.yml
      - Use env_file for sensitive data
      - Minimize port exposure (prefer docker-network only)
      - No privileged containers unless absolutely required
      - Run as non-root user when possible

  ansible:
    role_standards:
      required_tasks:
        - Check secrets file exists
        - Fail if secrets missing with helpful error
        - Ensure service is running with docker_compose_v2
      optional_tasks:
        - Create required directories
        - Health check validation
        - Pre-flight checks (ports, dependencies)
      tags_required:
        - Service name tag (e.g., 'nginx', 'authentik')
        - lifecycle tag (for start/stop operations)
        - config tag (for configuration changes)
      idempotency:
        - Roles must be idempotent (safe to run multiple times)
        - Use state: present (not restarted or recreated)
        - Check mode (--check) must work without changes to target
      health_checks:
        - Use meta: flush_handlers before health check
        - HTTP checks require Host header for docker network
        - Container-only services use docker_container_info
      handlers:
        - Name patterns: "Test {service}", "Reload {service}"
        - Should not fail if container not running

  nginx:
    config_standards:
      filename_pattern: '^\d{2}_[a-z0-9.-]+\.conf$'
      filename_prefix_guide:
        - "00-09: Base/default configurations"
        - "10-19: Primary services (auth, main apps)"
        - "20-29: Secondary services"
        - "30-39: Network services"
      location: platform/ingress/nginx/etc-nginx-docker/conf.d/
      server_blocks:
        internal_domains:
          - TLD: .geek
          - Protocol: HTTP only
          - Purpose: LAN access
        public_domains:
          - TLD: .johnnyblabs.com
          - Protocol: HTTPS with HTTP→HTTPS redirect
          - Certificate: /etc/nginx/certs/johnnyblabs.crt
      proxy_headers_required:
        - proxy_set_header Host $host
        - proxy_set_header X-Real-IP $remote_addr
        - proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for
        - proxy_set_header X-Forwarded-Proto (http|https)
      websocket_support:
        - proxy_http_version 1.1
        - proxy_set_header Upgrade $http_upgrade
        - proxy_set_header Connection "upgrade"

  security:
    principles:
      - Principle of least privilege
      - Default deny (firewall)
      - Secret segregation (never commit to git)
      - TLS everywhere (public domains)
      - Regular secret rotation
    secret_management:
      location: /etc/homelab/secrets/
      permissions:
        files: "0644"
        directory: "0755"
      naming: "{service-name}.env"
      git_policy: Never commit secrets, use .env.example only
    certificate_management:
      method: acme.sh with Cloudflare DNS-01
      location: /etc/nginx-docker/certs/
      permissions:
        private_keys: "0600"
        certificates: "0644"
      renewal: Automatic via acme.sh cron
    firewall:
      tool: UFW (Uncomplicated Firewall)
      default_policy: deny incoming, allow outgoing
      lan_subnet: 192.168.1.0/24
      public_ports: [22, 80, 443]
      lan_only_ports: [53, 222, 9090, 11434, 5901]

  documentation:
    required_files:
      root_level:
        - README.md (architecture, quick start, workflows)
        - ADMIN.md (principles, non-negotiables)
        - CHECKLIST.md (progress tracking)
      docs_directory:
        - ANSIBLE_DEPLOYMENT.md (deployment workflows)
        - FIREWALL.md (firewall rules and management)
        - TLS_CERTIFICATES.md (certificate management)
        - BOOKSTACK_INFRASTRUCTURE.md (service-specific docs)
      service_level:
        - .env.example (for services with secrets)
        - README.md (service-specific guidance)
    standards:
      - Use Markdown format
      - Include diagrams where helpful (mermaid or ASCII)
      - Document both normal and emergency procedures
      - Include troubleshooting sections
      - Keep up to date with actual implementation

  versioning:
    docker_images:
      preference_order:
        1: "Pinned semantic version (e.g., postgres:16.2.1)"
        2: "Major version pin (e.g., postgres:16)"
        3: "Stable/LTS tag (e.g., ubuntu:22.04)"
        4: "Latest tag (acceptable for non-critical services)"
      avoid:
        - Rolling tags without monitoring
        - Unpinned tags for critical infrastructure
      update_process:
        1: Check release notes for breaking changes
        2: Test in non-production if possible
        3: Update docker-compose.yml with new version
        4: Commit change with descriptive message
        5: Deploy via Ansible
        6: Verify health checks pass
        7: Monitor logs for issues

  backup:
    strategy:
      databases:
        - Method: pg_dump for PostgreSQL
        - Frequency: Daily
        - Retention: 30 days
        - Location: /srv/homelab/backups/
      volumes:
        - Method: rsync or tar
        - Frequency: Weekly
        - Retention: 4 weeks
        - Location: /srv/homelab/backups/
      configuration:
        - Method: Git repository
        - Frequency: On every change
        - Retention: Indefinite (Git history)
    restore_testing:
      - Test restore procedure quarterly
      - Document restore steps
      - Verify backups are not corrupted

# Validation Rules
x-validation-rules:
  critical:
    - rule: no-secrets-in-git
      description: No .env files (except .env.example), .key files, or hardcoded passwords in repository
      check: Scan for common secret patterns in git-tracked files
      severity: critical

    - rule: all-services-have-ansible-role
      description: Every docker-compose.yml must have corresponding Ansible role
      check: Compare platform/* directories with ansible/roles/*
      severity: high

    - rule: secrets-file-exists
      description: All services with env_file must have secrets file on host
      check: Ansible role checks for file existence
      severity: critical

    - rule: pinned-versions-for-critical
      description: Critical services (postgres, authentik, nginx) must use pinned versions
      check: Parse docker-compose.yml image tags
      severity: high

    - rule: geek-infra-network
      description: All services must use geek-infra external network
      check: Parse docker-compose.yml networks section
      severity: high

  important:
    - rule: health-checks-implemented
      description: All Ansible roles should include health check tasks
      check: Parse Ansible role tasks for health check patterns
      severity: medium

    - rule: nginx-config-for-web-services
      description: Services with web UI must have nginx reverse proxy config
      check: Match service domains with nginx conf.d/*.conf files
      severity: medium

    - rule: backup-strategy-documented
      description: Services marked backup_required must have backup procedure
      check: Cross-reference with docs/BACKUP.md or scripts/backup_*.sh
      severity: medium

    - rule: documentation-exists
      description: Each service should have documentation (README, docs/, or inline comments)
      check: Verify documentation files exist for each service
      severity: medium

    - rule: firewall-rules-match-ports
      description: Exposed host ports must have corresponding UFW rules
      check: Compare docker-compose port mappings with ansible/roles/firewall/tasks/main.yml
      severity: high

  recommended:
    - rule: latest-versions-checked
      description: Service versions should be checked within last 90 days
      check: Compare last_checked dates in this spec
      severity: low

    - rule: environment-examples-exist
      description: Services with secrets should have .env.example file
      check: Verify .env.example exists in service directory
      severity: low

    - rule: consistent-naming
      description: Container names should match service names (with optional prefix)
      check: Parse docker-compose.yml container_name fields
      severity: low

    - rule: restart-policy
      description: All services should have restart policy (unless-stopped or always)
      check: Parse docker-compose.yml restart fields
      severity: low

