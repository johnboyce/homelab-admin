d openapi: 3.1.0
info:
  title: Homelab Infrastructure Specification
  version: 1.0.0
  description: |
    Infrastructure specification for the geek homelab platform.
    
    This spec defines:
    - Service architecture patterns and standards
    - Docker Compose configuration requirements
    - Ansible role expectations
    - nginx configuration patterns
    - Security and networking standards
    - Version management and update policies
    
    Purpose: Validation, consistency checking, documentation, and best practices enforcement.
  contact:
    name: Homelab Admin
    url: https://github.com/johnboyce/homelab-admin
  license:
    name: Private

servers:
  - url: https://geek.local
    description: geek host (Ubuntu server)

tags:
  - name: infrastructure
    description: Core infrastructure services (nginx, postgres, docker network)
  - name: identity
    description: Authentication and SSO services (Authentik)
  - name: applications
    description: User-facing applications (BookStack, Forgejo, etc.)
  - name: automation
    description: CI/CD and automation services (Woodpecker)
  - name: network
    description: Network services (Pi-hole, Cloudflare DDNS)
  - name: security
    description: Security services (Vaultwarden, firewall)

components:
  schemas:
    # Core service definition
    ServiceDefinition:
      type: object
      required:
        - name
        - category
        - docker_compose_path
        - ansible_role
        - network
        - version_policy
      properties:
        name:
          type: string
          description: Service identifier (lowercase, hyphenated)
          pattern: '^[a-z0-9-]+$'
        display_name:
          type: string
          description: Human-readable service name
        category:
          type: string
          enum: [infrastructure, identity, applications, automation, network, security, data]
        description:
          type: string
          description: Brief description of service purpose
        docker_compose_path:
          type: string
          description: Path relative to repo root
          pattern: '^platform/[a-z0-9-]+/docker-compose\.yml$'
        ansible_role:
          type: string
          description: Ansible role name managing this service
        network:
          type: string
          description: Docker network name
          default: geek-infra
        version_policy:
          $ref: '#/components/schemas/VersionPolicy'
        ports:
          type: array
          items:
            $ref: '#/components/schemas/PortMapping'
        domains:
          type: array
          items:
            $ref: '#/components/schemas/DomainConfig'
        dependencies:
          type: array
          items:
            type: string
          description: Other services this service depends on
        secrets:
          $ref: '#/components/schemas/SecretsConfig'
        volumes:
          type: array
          items:
            $ref: '#/components/schemas/VolumeMount'
        health_check:
          $ref: '#/components/schemas/HealthCheck'
        backup_required:
          type: boolean
          description: Whether this service requires backup strategy
        documentation_links:
          type: array
          items:
            type: string
            format: uri

    # Version management policy
    VersionPolicy:
      type: object
      required:
        - strategy
        - current_version
      properties:
        strategy:
          type: string
          enum: [pinned, latest, latest-stable, major-pinned, rolling]
          description: |
            - pinned: Specific version tag (e.g., "16.2.1")
            - latest: Use :latest tag
            - latest-stable: Use latest stable release tag
            - major-pinned: Pin to major version (e.g., "16")
            - rolling: Follow rolling release tag
        current_version:
          type: string
          description: Current deployed version or tag
        update_schedule:
          type: string
          enum: [manual, monthly, quarterly, security-only]
        upstream_source:
          type: string
          format: uri
          description: URL to check for latest versions
        last_checked:
          type: string
          format: date
          description: Last time version was checked
        last_updated:
          type: string
          format: date
          description: Last time service was updated
        notes:
          type: string
          description: Version-specific notes or breaking changes

    # Port mapping configuration
    PortMapping:
      type: object
      required:
        - container_port
        - purpose
      properties:
        host_port:
          type: integer
          minimum: 1
          maximum: 65535
          description: Port exposed on host (null if not exposed)
        container_port:
          type: integer
          minimum: 1
          maximum: 65535
          description: Port inside container
        protocol:
          type: string
          enum: [tcp, udp]
          default: tcp
        purpose:
          type: string
          description: What this port is used for
        access_scope:
          type: string
          enum: [public, lan, docker-network, localhost]
          description: Network scope of access
        firewall_rule:
          type: boolean
          description: Whether UFW rule is required

    # Domain and routing configuration
    DomainConfig:
      type: object
      required:
        - fqdn
        - type
      properties:
        fqdn:
          type: string
          format: hostname
          description: Fully qualified domain name
        type:
          type: string
          enum: [internal, public]
          description: Internal (.geek) or public (.johnnyblabs.com)
        protocol:
          type: string
          enum: [http, https]
        nginx_config:
          type: string
          description: Path to nginx conf file in repo
        tls_certificate:
          type: string
          description: Certificate name (if HTTPS)
        authentik_protected:
          type: boolean
          description: Whether this domain requires Authentik authentication

    # Secrets management
    SecretsConfig:
      type: object
      required:
        - env_file_path
        - required_vars
      properties:
        env_file_path:
          type: string
          description: Path to secrets file on host
          pattern: '^/etc/homelab/secrets/[a-z0-9-]+\.env$'
        required_vars:
          type: array
          items:
            type: string
          description: List of required environment variables
        example_file:
          type: string
          description: Path to .env.example in repo
        rotation_required:
          type: boolean
          description: Whether secrets should be rotated periodically

    # Volume mount
    VolumeMount:
      type: object
      required:
        - host_path
        - container_path
      properties:
        host_path:
          type: string
          pattern: '^/srv/homelab/[a-z0-9-]+/'
          description: Path on host system
        container_path:
          type: string
          description: Path inside container
        mode:
          type: string
          enum: [ro, rw]
          default: rw
        backup_required:
          type: boolean
          description: Whether this volume needs backup

    # Health check definition
    HealthCheck:
      type: object
      required:
        - method
      properties:
        method:
          type: string
          enum: [http, container-status, tcp-socket, command]
        endpoint:
          type: string
          description: HTTP endpoint for health check
        expected_status:
          type: integer
          default: 200
        timeout:
          type: integer
          description: Timeout in seconds
          default: 10
        ansible_check:
          type: string
          description: Ansible module used for health check (uri, docker_container_info, etc.)

    # Ansible role specification
    AnsibleRole:
      type: object
      required:
        - name
        - path
        - tasks_complete
      properties:
        name:
          type: string
          pattern: '^[a-z0-9_]+$'
        path:
          type: string
          pattern: '^ansible/roles/[a-z0-9_]+/$'
        tasks_complete:
          type: boolean
          description: Whether role tasks are fully implemented
        handlers:
          type: array
          items:
            type: string
          description: List of handlers defined
        tags:
          type: array
          items:
            type: string
          description: Ansible tags for selective execution
        idempotent:
          type: boolean
          description: Whether role can be run multiple times safely
        dependencies:
          type: array
          items:
            type: string
          description: Other roles that must run first

    # nginx configuration spec
    NginxConfig:
      type: object
      required:
        - filename
        - server_name
        - upstream_target
      properties:
        filename:
          type: string
          pattern: '^\d{2}_[a-z0-9.-]+\.conf$'
          description: Config file with numeric prefix
        server_name:
          type: string
          description: nginx server_name directive value
        upstream_target:
          type: string
          description: Backend container:port
        ssl_enabled:
          type: boolean
        http_redirect:
          type: boolean
          description: Whether HTTP redirects to HTTPS
        special_locations:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              purpose:
                type: string
        proxy_settings:
          type: object
          description: Special proxy configuration (websockets, large headers, etc.)

    # Compliance check result
    ComplianceCheck:
      type: object
      required:
        - service
        - check_type
        - status
      properties:
        service:
          type: string
        check_type:
          type: string
          enum: [version, security, configuration, documentation, backup, secrets]
        status:
          type: string
          enum: [pass, fail, warning, info]
        message:
          type: string
        remediation:
          type: string
          description: How to fix if status is fail or warning
        priority:
          type: string
          enum: [critical, high, medium, low]

paths:
  # This section documents the validation endpoints/checks
  /validate/service/{serviceName}:
    get:
      summary: Validate a service configuration
      description: |
        Checks that a service adheres to homelab standards:
        - Docker Compose syntax and patterns
        - Ansible role completeness
        - Version currency
        - Security best practices
        - Documentation coverage
      tags: [validation]
      parameters:
        - name: serviceName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service validation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                  checks:
                    type: array
                    items:
                      $ref: '#/components/schemas/ComplianceCheck'

  /validate/versions:
    get:
      summary: Check all service versions
      description: |
        Scans all docker-compose.yml files and reports:
        - Current version deployed
        - Latest available version
        - Update recommendation
        - Breaking changes to consider
      tags: [validation]
      responses:
        '200':
          description: Version check results
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        current_version:
                          type: string
                        latest_version:
                          type: string
                        update_available:
                          type: boolean
                        severity:
                          type: string
                          enum: [security, feature, patch]
                        breaking_changes:
                          type: boolean

  /validate/security:
    get:
      summary: Security posture assessment
      description: |
        Checks security compliance:
        - Secret files not committed
        - TLS configuration
        - Firewall rules
        - Port exposure audit
        - Container security (no privileged, proper user)
      tags: [validation, security]
      responses:
        '200':
          description: Security assessment results
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall_status:
                    type: string
                    enum: [secure, needs-attention, critical]
                  checks:
                    type: array
                    items:
                      $ref: '#/components/schemas/ComplianceCheck'

  /validate/documentation:
    get:
      summary: Documentation coverage check
      description: |
        Ensures all services have:
        - README or docs entry
        - .env.example for secrets
        - Ansible role documentation
        - Recovery procedures
      tags: [validation]
      responses:
        '200':
          description: Documentation coverage results

  /validate/ansible:
    get:
      summary: Ansible role validation
      description: |
        Validates Ansible roles:
        - Idempotency (can run multiple times)
        - Proper handlers
        - Health checks implemented
        - Tags properly used
        - Dependencies declared
      tags: [validation]
      responses:
        '200':
          description: Ansible validation results

# Service Registry - Complete inventory of all services
x-service-registry:
  nginx:
    name: nginx
    display_name: nginx Reverse Proxy
    category: infrastructure
    description: HTTP/HTTPS reverse proxy with TLS termination
    docker_compose_path: platform/nginx/docker-compose.yml
    ansible_role: nginx
    network: geek-infra
    version_policy:
      strategy: major-pinned
      current_version: "1.29.4"
      update_schedule: quarterly
      upstream_source: https://hub.docker.com/_/nginx
      last_checked: "2026-03-04"
      notes: "Pin to 1.x major version for stability"
    ports:
      - host_port: 80
        container_port: 80
        protocol: tcp
        purpose: HTTP traffic
        access_scope: public
        firewall_rule: true
      - host_port: 443
        container_port: 443
        protocol: tcp
        purpose: HTTPS traffic
        access_scope: public
        firewall_rule: true
    volumes:
      - host_path: /etc/nginx-docker/nginx.conf
        container_path: /etc/nginx/nginx.conf
        mode: ro
        backup_required: false
      - host_path: /etc/nginx-docker/conf.d
        container_path: /etc/nginx/conf.d
        mode: ro
        backup_required: false
      - host_path: /etc/nginx-docker/certs
        container_path: /etc/nginx/certs
        mode: ro
        backup_required: false
    health_check:
      method: http
      endpoint: /healthz
      expected_status: 200
      ansible_check: uri
    backup_required: false
    documentation_links:
      - "docs/TLS_CERTIFICATES.md"
      - "platform/ingress/nginx/etc-nginx-docker/conf.d/README.md"

  postgres:
    name: postgres
    display_name: PostgreSQL Database
    category: data
    description: Shared PostgreSQL database for multiple services
    docker_compose_path: platform/postgres/docker-compose.yml
    ansible_role: postgres
    network: geek-infra
    version_policy:
      strategy: major-pinned
      current_version: "16"
      update_schedule: security-only
      upstream_source: https://hub.docker.com/_/postgres
      last_checked: "2026-03-04"
      notes: "Pin to PostgreSQL 16.x for stability, upgrade major versions cautiously"
    ports:
      - container_port: 5432
        protocol: tcp
        purpose: PostgreSQL database connections
        access_scope: docker-network
        firewall_rule: false
    secrets:
      env_file_path: /etc/homelab/secrets/postgres.env
      required_vars:
        - POSTGRES_PASSWORD
        - POSTGRES_USER
        - POSTGRES_DB
      example_file: platform/postgres/.env.example
      rotation_required: true
    volumes:
      - host_path: /srv/homelab/postgres/pgdata
        container_path: /var/lib/postgresql/data
        backup_required: true
    health_check:
      method: command
      ansible_check: docker_container_info
    backup_required: true
    documentation_links:
      - "docs/BACKUP.md"

  authentik:
    name: authentik
    display_name: Authentik SSO
    category: identity
    description: Identity provider and SSO platform
    docker_compose_path: platform/authentik/docker-compose.yml
    ansible_role: authentik
    network: geek-infra
    version_policy:
      strategy: pinned
      current_version: "2025.10.4"
      update_schedule: manual
      upstream_source: https://github.com/goauthentik/authentik/releases
      last_checked: "2026-03-04"
      notes: "Pin version and test thoroughly before upgrading (breaking changes common)"
    ports:
      - host_port: 9000
        container_port: 9000
        protocol: tcp
        purpose: Authentik server HTTP
        access_scope: docker-network
        firewall_rule: false
      - host_port: 9443
        container_port: 9443
        protocol: tcp
        purpose: Authentik server HTTPS
        access_scope: docker-network
        firewall_rule: false
    domains:
      - fqdn: auth.geek
        type: internal
        protocol: http
        nginx_config: platform/ingress/nginx/etc-nginx-docker/conf.d/11_auth.geek.conf
      - fqdn: auth.johnnyblabs.com
        type: public
        protocol: https
        nginx_config: platform/ingress/nginx/etc-nginx-docker/conf.d/10_auth.johnnyblabs.com.conf
        tls_certificate: johnnyblabs.crt
    dependencies:
      - postgres
    secrets:
      env_file_path: /etc/homelab/secrets/authentik.env
      required_vars:
        - AUTHENTIK_SECRET_KEY
        - AUTHENTIK_POSTGRESQL__PASSWORD
        - AUTHENTIK_TOKEN
      example_file: platform/authentik/.env.example
      rotation_required: true
    volumes:
      - host_path: /srv/homelab/authentik/media
        container_path: /media
        backup_required: true
      - host_path: /srv/homelab/authentik/custom-templates
        container_path: /templates
        backup_required: true
    health_check:
      method: http
      endpoint: /
      expected_status: 200
      ansible_check: uri
    backup_required: true
    documentation_links:
      - "AUTHENTIK_ENV_CONFIG.md"
      - "AUTHENTIK_UPGRADE.md"

  bookstack:
    name: bookstack
    display_name: BookStack Wiki
    category: applications
    description: Documentation and wiki platform
    docker_compose_path: platform/bookstack/docker-compose.yml
    ansible_role: bookstack
    network: geek-infra
    version_policy:
      strategy: pinned
      current_version: "25.12.7"
      update_schedule: quarterly
      upstream_source: https://hub.docker.com/r/linuxserver/bookstack
      last_checked: "2026-03-04"
      notes: "LinuxServer.io versioning: YY.MM.patch"
    ports:
      - container_port: 80
        protocol: tcp
        purpose: BookStack web interface
        access_scope: docker-network
        firewall_rule: false
    domains:
      - fqdn: bookstack.geek
        type: internal
        protocol: http
        nginx_config: platform/ingress/nginx/etc-nginx-docker/conf.d/21_bookstack.geek.conf
      - fqdn: bookstack.johnnyblabs.com
        type: public
        protocol: https
        nginx_config: platform/ingress/nginx/etc-nginx-docker/conf.d/20_bookstack.johnnyblabs.com.conf
        tls_certificate: johnnyblabs.crt
        authentik_protected: true
    dependencies:
      - bookstack-db
    secrets:
      env_file_path: /etc/homelab/secrets/bookstack.env
      required_vars:
        - APP_KEY
        - DB_PASSWORD
        - MYSQL_PASSWORD
        - MYSQL_ROOT_PASSWORD
      rotation_required: true
    volumes:
      - host_path: /srv/homelab/bookstack/config
        container_path: /config
        backup_required: true
      - host_path: /srv/homelab/bookstack/mysql
        container_path: /config
        backup_required: true
    health_check:
      method: http
      endpoint: /
      ansible_check: uri
    backup_required: true
    documentation_links:
      - "docs/BOOKSTACK_INFRASTRUCTURE.md"

  forgejo:
    name: forgejo
    display_name: Forgejo Git Service
    category: applications
    description: Self-hosted Git service (GitHub alternative)
    docker_compose_path: platform/forgejo/docker-compose.yml
    ansible_role: forgejo
    network: geek-infra
    version_policy:
      strategy: major-pinned
      current_version: "14"
      update_schedule: quarterly
      upstream_source: https://codeberg.org/forgejo/forgejo/releases
      last_checked: "2026-03-04"
      notes: "Major version 14 (rolling tag)"
    ports:
      - host_port: 222
        container_port: 2222
        protocol: tcp
        purpose: Git SSH access
        access_scope: lan
        firewall_rule: true
      - container_port: 3000
        protocol: tcp
        purpose: Forgejo web UI
        access_scope: docker-network
        firewall_rule: false
    domains:
      - fqdn: forgejo.geek
        type: internal
        protocol: http
        nginx_config: platform/ingress/nginx/etc-nginx-docker/conf.d/12_forgejo.geek.conf
    dependencies:
      - postgres
    secrets:
      env_file_path: /etc/homelab/secrets/forgejo.env
      required_vars:
        - FORGEJO__database__PASSWD
      rotation_required: true
    volumes:
      - host_path: /srv/homelab/forgejo/data
        container_path: /data
        backup_required: true
    health_check:
      method: container-status
      ansible_check: docker_container_info
    backup_required: true

  woodpecker:
    name: woodpecker
    display_name: Woodpecker CI
    category: automation
    description: CI/CD automation integrated with Forgejo
    docker_compose_path: platform/woodpecker/docker-compose.yml
    ansible_role: woodpecker
    network: geek-infra
    version_policy:
      strategy: latest
      current_version: latest
      update_schedule: monthly
      upstream_source: https://hub.docker.com/r/woodpeckerci/woodpecker-server
      last_checked: "2026-03-04"
      notes: "Using latest tag, monitor for breaking changes"
    ports:
      - container_port: 8000
        protocol: tcp
        purpose: Woodpecker web UI
        access_scope: docker-network
      - container_port: 9000
        protocol: tcp
        purpose: Woodpecker gRPC
        access_scope: docker-network
    domains:
      - fqdn: woodpecker.geek
        type: internal
        protocol: http
        nginx_config: platform/ingress/nginx/etc-nginx-docker/conf.d/14_woodpecker.geek.conf
    dependencies:
      - forgejo
    secrets:
      env_file_path: /etc/homelab/secrets/woodpecker.env
      required_vars:
        - WOODPECKER_AGENT_SECRET
        - WOODPECKER_FORGEJO_CLIENT
        - WOODPECKER_FORGEJO_SECRET
      rotation_required: true
    volumes:
      - host_path: /srv/homelab/woodpecker/agent
        container_path: /etc/woodpecker
        backup_required: false
    health_check:
      method: container-status
      ansible_check: docker_container_info
    backup_required: false

  vaultwarden:
    name: vaultwarden
    display_name: Vaultwarden
    category: security
    description: Self-hosted Bitwarden-compatible password manager
    docker_compose_path: platform/vaultwarden/docker-compose.yml
    ansible_role: vaultwarden
    network: geek-infra
    version_policy:
      strategy: latest
      current_version: latest
      update_schedule: monthly
      upstream_source: https://hub.docker.com/r/vaultwarden/server
      last_checked: "2026-03-04"
      notes: "Security-critical service, monitor for CVEs"
    ports:
      - container_port: 80
        protocol: tcp
        purpose: Vaultwarden web interface
        access_scope: docker-network
    domains:
      - fqdn: vaultwarden.geek
        type: internal
        protocol: http
        nginx_config: platform/ingress/nginx/etc-nginx-docker/conf.d/15_vaultwarden.geek.conf
      - fqdn: vaultwarden.johnnyblabs.com
        type: public
        protocol: https
        nginx_config: platform/ingress/nginx/etc-nginx-docker/conf.d/22_vaultwarden.johnnyblabs.com.conf
        tls_certificate: johnnyblabs.crt
    secrets:
      env_file_path: /etc/homelab/secrets/vaultwarden.env
      required_vars:
        - ADMIN_TOKEN
      rotation_required: true
    volumes:
      - host_path: /srv/homelab/vaultwarden/data
        container_path: /data
        backup_required: true
    health_check:
      method: http
      endpoint: /
      ansible_check: uri
    backup_required: true

  pihole:
    name: pihole
    display_name: Pi-hole DNS
    category: network
    description: Network-wide ad blocking and DNS server
    docker_compose_path: platform/pihole/docker-compose.yml
    ansible_role: pihole
    network: geek-infra
    version_policy:
      strategy: latest
      current_version: latest
      update_schedule: monthly
      upstream_source: https://hub.docker.com/r/pihole/pihole
      last_checked: "2026-03-04"
    ports:
      - host_port: 53
        container_port: 53
        protocol: tcp
        purpose: DNS queries
        access_scope: lan
        firewall_rule: true
      - host_port: 53
        container_port: 53
        protocol: udp
        purpose: DNS queries
        access_scope: lan
        firewall_rule: true
      - host_port: 8081
        container_port: 80
        protocol: tcp
        purpose: Admin interface
        access_scope: localhost
        firewall_rule: false
    domains:
      - fqdn: pihole.geek
        type: internal
        protocol: http
        nginx_config: platform/ingress/nginx/etc-nginx-docker/conf.d/31_pihole.geek.conf
    secrets:
      env_file_path: /etc/homelab/secrets/pihole.env
      required_vars:
        - WEBPASSWORD
      rotation_required: false
    volumes:
      - host_path: /srv/homelab/pihole/etc-pihole
        container_path: /etc/pihole
        backup_required: true
      - host_path: /srv/homelab/pihole/etc-dnsmasq.d
        container_path: /etc/dnsmasq.d
        backup_required: true
    health_check:
      method: tcp-socket
      ansible_check: docker_container_info
    backup_required: true

  plane:
    name: plane
    display_name: Plane Project Management
    category: applications
    description: Open-source project management tool
