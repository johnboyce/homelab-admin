# OpenSpec Plugin Landing Page — public, no authentication
server {
    listen 80;
    server_name openspec.johnnyblabs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name openspec.johnnyblabs.com;

    ssl_certificate     /etc/nginx/certs/johnnyblabs.crt;
    ssl_certificate_key /etc/nginx/certs/johnnyblabs.key;

    root /usr/share/nginx/html/openspec;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
