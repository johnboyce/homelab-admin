services:
  forgejo-runner:
    image: code.forgejo.org/forgejo/runner:6
    container_name: forgejo-runner
    restart: unless-stopped
    env_file: /etc/homelab/secrets/forgejo-runner.env
    environment:
      FORGEJO_INSTANCE_URL: "http://forgejo.geek"
    group_add:
      - "983"  # docker group GID on geek host
    command:
      - sh
      - -c
      - |
        cd /data
        if [ ! -f /data/.runner ]; then
          forgejo-runner register --no-interactive \
            --instance "$$FORGEJO_INSTANCE_URL" \
            --token "$$FORGEJO_RUNNER_REGISTRATION_TOKEN" \
            --name "geek-runner" \
            --labels "ubuntu-latest:docker://node:20-bullseye,ubuntu-22.04:docker://node:20-bullseye,debian-latest:docker://debian:bookworm"
        fi
        exec forgejo-runner daemon
    volumes:
      - /srv/homelab/forgejo-runner/data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    networks:
      - geek-infra

networks:
  geek-infra:
    external: true
