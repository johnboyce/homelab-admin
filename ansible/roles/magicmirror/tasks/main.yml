---
# MagicMirror² morning dashboard role
# Manages: Docker service + standalone X kiosk on VT8 + system-level timers
# Secrets:  /etc/homelab/secrets/magicmirror.env (OPENWEATHERMAP_API_KEY)
# Data:     /srv/homelab/magicmirror/
# Access:   http://magicmirror.geek (LAN only, nginx proxy)

# --- Secrets ---

- name: Check MagicMirror secrets file exists
  stat:
    path: /etc/homelab/secrets/magicmirror.env
  become: yes
  register: magicmirror_secrets
  tags: [magicmirror, lifecycle]

- name: Fail if secrets file is missing
  fail:
    msg: |
      /etc/homelab/secrets/magicmirror.env not found.
      Create it on geek before deploying:
        sudo bash -c 'echo "OPENWEATHERMAP_API_KEY=<your-key>" \
          > /etc/homelab/secrets/magicmirror.env && \
          chmod 600 /etc/homelab/secrets/magicmirror.env'
      Register a free API key at: https://openweathermap.org → API keys
  when: not magicmirror_secrets.stat.exists
  tags: [magicmirror, lifecycle]

- name: Read OPENWEATHERMAP_API_KEY from secrets file
  shell: "grep '^OPENWEATHERMAP_API_KEY=' /etc/homelab/secrets/magicmirror.env | cut -d= -f2"
  become: yes
  register: owm_key_result
  changed_when: false
  no_log: true
  tags: [magicmirror, lifecycle]

- name: Set OWM API key fact
  set_fact:
    openweathermap_api_key: "{{ owm_key_result.stdout }}"
  no_log: true
  tags: [magicmirror, lifecycle]

# --- Docker service ---

- name: Ensure MagicMirror data directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: yes
  loop:
    - /srv/homelab/magicmirror/config
    - /srv/homelab/magicmirror/modules
    - /srv/homelab/magicmirror/css
  tags: [magicmirror, lifecycle]

- name: Deploy MagicMirror config.js from template
  template:
    src: config.js.j2
    dest: /srv/homelab/magicmirror/config/config.js
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: Restart MagicMirror
  no_log: true
  tags: [magicmirror, config]

- name: Deploy custom.css for module styling
  copy:
    src: custom.css
    dest: /srv/homelab/magicmirror/css/custom.css
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: Restart MagicMirror
  tags: [magicmirror, config]

- name: Ensure MagicMirror container is running
  community.docker.docker_compose_v2:
    project_src: /home/johnb/homelab-admin/platform/magicmirror
    state: present
    pull: policy
  become: yes
  tags: [magicmirror, lifecycle]

- name: Check MagicMirror container state
  community.docker.docker_container_info:
    name: geek-magicmirror
  register: magicmirror_info
  become: yes
  tags: [magicmirror, lifecycle]

- name: Report MagicMirror container state
  debug:
    msg: "MagicMirror container state: {{ magicmirror_info.container.State.Status | default('not found') }}"
  tags: [magicmirror, lifecycle]

# --- Modules ---

- name: Download MMM-Jast module tarball (Yahoo Finance stocks, no API key)
  shell: |
    curl -fsSL https://github.com/jalibu/MMM-Jast/archive/refs/heads/main.tar.gz \
      | tar -xz -C /srv/homelab/magicmirror/modules/ && \
    mv /srv/homelab/magicmirror/modules/MMM-Jast-main \
       /srv/homelab/magicmirror/modules/MMM-Jast
  args:
    creates: /srv/homelab/magicmirror/modules/MMM-Jast/package.json
  become: yes
  register: mmm_jast_downloaded
  tags: [magicmirror, modules]

- name: Install MMM-Jast npm dependencies inside container
  shell: >
    docker exec --user root geek-magicmirror
    sh -c 'cd /opt/magic_mirror/modules/MMM-Jast && npm install --production'
  become: yes
  when: mmm_jast_downloaded.changed
  tags: [magicmirror, modules]

- name: Ensure MMM-CameraSnapshots module and cache directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: yes
  loop:
    - /srv/homelab/magicmirror/modules/MMM-CameraSnapshots
    - /srv/homelab/magicmirror/modules/MMM-CameraSnapshots/cache
  tags: [magicmirror, modules]

- name: Deploy MMM-CameraSnapshots module files
  copy:
    src: "MMM-CameraSnapshots/{{ item }}"
    dest: /srv/homelab/magicmirror/modules/MMM-CameraSnapshots/{{ item }}
    owner: root
    group: root
    mode: '0644'
  become: yes
  loop:
    - MMM-CameraSnapshots.js
    - MMM-CameraSnapshots.css
  notify: Restart MagicMirror
  tags: [magicmirror, modules]

# --- Host-level: Package dependencies ---

- name: Ensure kiosk packages are installed
  apt:
    name:
      - chromium-browser
      - xinit
      - x11-xserver-utils
    state: present
    update_cache: yes
  become: yes
  tags: [magicmirror, kiosk]

- name: Allow any user to start X server (required for systemd kiosk service)
  lineinfile:
    path: /etc/X11/Xwrapper.config
    regexp: '^allowed_users='
    line: 'allowed_users=anybody'
  become: yes
  tags: [magicmirror, kiosk]

# --- GDM cleanup: remove auto-login and Wayland hack ---

- name: Remove GDM3 autologin block (Ansible-managed markers)
  blockinfile:
    path: /etc/gdm3/custom.conf
    marker: "# {mark} ANSIBLE MANAGED — autologin"
    state: absent
  become: yes
  notify: Restart GDM
  tags: [magicmirror, kiosk]

- name: Disable GDM3 automatic login
  lineinfile:
    path: /etc/gdm3/custom.conf
    regexp: '^\s*AutomaticLoginEnable\s*='
    state: absent
  become: yes
  notify: Restart GDM
  tags: [magicmirror, kiosk]

- name: Remove GDM3 automatic login user
  lineinfile:
    path: /etc/gdm3/custom.conf
    regexp: '^\s*AutomaticLogin\s*=\s*\w'
    state: absent
  become: yes
  notify: Restart GDM
  tags: [magicmirror, kiosk]

- name: Remove forced WaylandEnable=false (kiosk uses its own X server)
  lineinfile:
    path: /etc/gdm3/custom.conf
    regexp: '^WaylandEnable=false'
    state: absent
    backup: yes
  become: yes
  notify: Restart GDM
  tags: [magicmirror, kiosk]

# --- Legacy cleanup: stop and remove old user-level kiosk infrastructure ---

- name: Stop and disable old user-level timers (ignore errors if not present)
  shell: |
    uid=$(id -u johnb)
    sudo -u johnb \
      XDG_RUNTIME_DIR=/run/user/$uid \
      DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$uid/bus \
      systemctl --user disable --now {{ item }} 2>/dev/null || true
  become: yes
  changed_when: false
  loop:
    - magicmirror-wake.timer
    - magicmirror-sleep.timer
    - magicmirror-snapshot-cache.timer
  tags: [magicmirror, cleanup]

- name: Remove old user-level systemd unit files
  file:
    path: /home/johnb/.config/systemd/user/{{ item }}
    state: absent
  become: yes
  loop:
    - magicmirror-wake.service
    - magicmirror-wake.timer
    - magicmirror-sleep.service
    - magicmirror-sleep.timer
    - magicmirror-snapshot-cache.service
    - magicmirror-snapshot-cache.timer
  tags: [magicmirror, cleanup]

- name: Remove legacy scripts from johnb home
  file:
    path: /home/johnb/.local/bin/{{ item }}
    state: absent
  become: yes
  loop:
    - magicmirror-keep-awake.sh
    - magicmirror-kiosk.sh
    - magicmirror-display-wake.sh
    - magicmirror-display-sleep.sh
  tags: [magicmirror, cleanup]

- name: Remove legacy autostart entries
  file:
    path: /home/johnb/.config/autostart/{{ item }}
    state: absent
  become: yes
  loop:
    - magicmirror-kiosk.desktop
    - display-noblank.desktop
  tags: [magicmirror, cleanup]

# --- Deploy new kiosk scripts ---

- name: Ensure johnb local bin directory exists
  file:
    path: /home/johnb/.local/bin
    state: directory
    owner: johnb
    group: johnb
    mode: '0755'
  become: yes
  tags: [magicmirror, kiosk]

- name: Deploy kiosk scripts
  copy:
    src: "{{ item }}"
    dest: /home/johnb/.local/bin/{{ item }}
    owner: johnb
    group: johnb
    mode: '0755'
  become: yes
  loop:
    - magicmirror-kiosk-x11.sh
    - magicmirror-kiosk-wake.sh
    - magicmirror-kiosk-sleep.sh
    - magicmirror-kiosk-boot-check.sh
    - magicmirror-snapshot-cache.sh
  tags: [magicmirror, kiosk]

# --- Deploy system-level systemd units ---

- name: Deploy kiosk systemd service
  copy:
    src: magicmirror-kiosk.service
    dest: /etc/systemd/system/magicmirror-kiosk.service
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: Reload systemd
  tags: [magicmirror, schedule]

- name: Deploy kiosk wake/sleep systemd units
  copy:
    src: "{{ item.src }}"
    dest: /etc/systemd/system/{{ item.dest }}
    owner: root
    group: root
    mode: '0644'
  become: yes
  loop:
    - { src: magicmirror-kiosk-wake.service, dest: magicmirror-kiosk-wake.service }
    - { src: magicmirror-kiosk-wake.timer, dest: magicmirror-kiosk-wake.timer }
    - { src: magicmirror-kiosk-sleep.service, dest: magicmirror-kiosk-sleep.service }
    - { src: magicmirror-kiosk-sleep.timer, dest: magicmirror-kiosk-sleep.timer }
  notify: Reload systemd
  tags: [magicmirror, schedule]

- name: Deploy kiosk boot-check service
  copy:
    src: magicmirror-kiosk-boot.service
    dest: /etc/systemd/system/magicmirror-kiosk-boot.service
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: Reload systemd
  tags: [magicmirror, schedule]

- name: Deploy snapshot cache systemd units
  copy:
    src: "{{ item.src }}"
    dest: /etc/systemd/system/{{ item.dest }}
    owner: root
    group: root
    mode: '0644'
  become: yes
  loop:
    - { src: magicmirror-snapshot-cache-system.service, dest: magicmirror-snapshot-cache.service }
    - { src: magicmirror-snapshot-cache-system.timer, dest: magicmirror-snapshot-cache.timer }
  notify: Reload systemd
  tags: [magicmirror, schedule]

# --- Enable and start system-level timers ---

- name: Flush handlers to ensure daemon-reload runs before enabling timers
  meta: flush_handlers
  tags: [magicmirror, schedule]

- name: Enable and start system-level timers
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
    daemon_reload: yes
  become: yes
  loop:
    - magicmirror-kiosk-wake.timer
    - magicmirror-kiosk-sleep.timer
    - magicmirror-snapshot-cache.timer
  tags: [magicmirror, schedule]

- name: Enable boot-check service (starts kiosk if boot occurs during wake window)
  systemd:
    name: magicmirror-kiosk-boot.service
    enabled: yes
    daemon_reload: yes
  become: yes
  tags: [magicmirror, schedule]
