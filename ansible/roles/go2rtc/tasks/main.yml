---
# go2rtc — RTSP-to-HTTP bridge for Eufy camera snapshots
# Secrets: /etc/homelab/secrets/go2rtc.env (RTSP URLs with credentials)
# Data:    /srv/homelab/go2rtc/config/
# Access:  http://go2rtc.geek (LAN only, nginx proxy)
# API:     GET /api/frame.jpeg?src=<camera> — on-demand snapshot

- name: Check go2rtc secrets file exists
  stat:
    path: /etc/homelab/secrets/go2rtc.env
  become: yes
  register: go2rtc_secrets
  tags: [go2rtc, lifecycle]

- name: Fail if go2rtc secrets file is missing
  fail:
    msg: |
      /etc/homelab/secrets/go2rtc.env not found.
      Create it on geek before deploying:
        sudo cp ~/homelab-admin/platform/go2rtc/.env.example /etc/homelab/secrets/go2rtc.env
        sudo chmod 600 /etc/homelab/secrets/go2rtc.env
      Then edit with real RTSP URLs from the Eufy Security app:
        Eufy app > Camera > Settings > Storage > NAS/RTSP > Enable RTSP
  when: not go2rtc_secrets.stat.exists
  tags: [go2rtc, lifecycle]

- name: Read EUFY_RTSP_BACKYARD from secrets
  shell: "grep '^EUFY_RTSP_BACKYARD=' /etc/homelab/secrets/go2rtc.env | cut -d= -f2-"
  become: yes
  register: go2rtc_backyard_result
  changed_when: false
  no_log: true
  tags: [go2rtc, lifecycle]

- name: Read EUFY_RTSP_BREEZEWAY from secrets
  shell: "grep '^EUFY_RTSP_BREEZEWAY=' /etc/homelab/secrets/go2rtc.env | cut -d= -f2-"
  become: yes
  register: go2rtc_breezeway_result
  changed_when: false
  no_log: true
  tags: [go2rtc, lifecycle]

- name: Read EUFY_RTSP_GARAGE from secrets
  shell: "grep '^EUFY_RTSP_GARAGE=' /etc/homelab/secrets/go2rtc.env | cut -d= -f2-"
  become: yes
  register: go2rtc_garage_result
  changed_when: false
  no_log: true
  tags: [go2rtc, lifecycle]

- name: Set go2rtc camera URL facts
  set_fact:
    go2rtc_cam_backyard: "{{ go2rtc_backyard_result.stdout }}"
    go2rtc_cam_breezeway: "{{ go2rtc_breezeway_result.stdout }}"
    go2rtc_cam_garage: "{{ go2rtc_garage_result.stdout }}"
  no_log: true
  tags: [go2rtc, lifecycle]

- name: Ensure go2rtc config directory exists
  file:
    path: /srv/homelab/go2rtc/config
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: yes
  tags: [go2rtc, lifecycle]

- name: Deploy go2rtc configuration from template
  template:
    src: go2rtc.yaml.j2
    dest: /srv/homelab/go2rtc/config/go2rtc.yaml
    owner: root
    group: root
    mode: '0600'
  become: yes
  notify: Restart go2rtc
  no_log: true
  tags: [go2rtc, config]

- name: Ensure go2rtc container is running
  community.docker.docker_compose_v2:
    project_src: /home/johnb/homelab-admin/platform/go2rtc
    state: present
    pull: policy
  become: yes
  tags: [go2rtc, lifecycle]

- name: Check go2rtc container state
  community.docker.docker_container_info:
    name: geek-go2rtc
  register: go2rtc_info
  become: yes
  tags: [go2rtc, lifecycle]

- name: Report go2rtc container state
  debug:
    msg: "go2rtc container state: {{ go2rtc_info.container.State.Status | default('not found') }}"
  tags: [go2rtc, lifecycle]
